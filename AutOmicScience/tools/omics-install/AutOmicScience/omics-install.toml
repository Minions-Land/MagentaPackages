kind = "tool"
name = "omics_install_env"
description = "Install (provision) a pinned Pixi environment declared in the AutOmicScience pixi.toml, so omics_compute can run for a modality. Runs `pixi install --locked --environment <env>`, which validates the committed pixi.lock against pixi.toml and materializes the environment under .pixi/envs. This is a privileged, network + workspace-write operation: it downloads conda/PyPI packages and writes the environment prefix. Run omics_preflight first to check whether an install is even needed."
runtime = "process"
command = "pixi"
args = ["install", "--locked"]
operation = "execute"
read_only = false
destructive = false
tags = ["trusted"]
timeout_ms = 600000

[metadata]
package = "AutOmicScience"
source = "AOSE pixi_install_env (crates/aose-tools/src/lib.rs) — pixi install -e <env>"
env_manifest = "pixi.toml"
env_lock = "pixi.lock"
preflight_tool = "omics_preflight"

[metadata.environments_by_modality]
scrna = "task1"
spatial = "task2"
scatac = "task4"
multiome = "task3"

[parameters]
type = "object"
required = ["environment"]

[parameters.properties.environment]
type = "string"
enum = ["default", "task1", "task2", "task3", "task4", "r-env", "all"]
description = "Pixi environment id to install. Map a modality with metadata.environments_by_modality (scrna->task1, spatial->task2, scatac->task4, multiome->task3). Use 'all' to install every environment."
