kind = "tool"
name = "omics_environment"
description = "Describe the Pixi environments used by AutOmicScience omics tools. Returns the workspace's environments (name, features, dependencies, tasks) as JSON via `pixi info --json`. Map a modality to its pinned environment using metadata.environments_by_modality."
runtime = "process"
command = "pixi"
args = ["info", "--json"]
operation = "read"
read_only = true
destructive = false
timeout_ms = 60000

[metadata]
package = "AutOmicScience"
env_manifest = "pixi.toml"
env_lock = "pixi.lock"
compute_tool = "omics_compute"

[metadata.environments_by_modality]
scrna = "task1"
spatial = "task2"
scatac = "task4"
multiome = "task3"

[parameters]
type = "object"
