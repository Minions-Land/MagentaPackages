kind = "tool"
name = "omics_environment"
description = "Describe the Pixi environments used by AutOmicScience omics tools. Returns the workspace's environments (name, features, dependencies, channels, tasks) as JSON via `pixi info --json`. Map a modality to its pinned environment: scrna->task1, spatial->task2, scatac->task4, multiome->task3."
runtime = "process"
command = "pixi"
# --manifest-path is explicit rather than relying on pixi's upward search happening
# to pass through the parent directory: the same contract omics-install.toml follows.
args = ["info", "--json", "--manifest-path", "../pixi.toml"]
operation = "read"
read_only = true
destructive = false
timeout_ms = 60000

[metadata]
package = "AutOmicScience"
compute_tool = "omics_compute"

[parameters]
type = "object"
