kind = "process"
name = "compare_images"
description = "Compare two plot images (before/after) to detect visual changes. Returns similarity score, count of changed regions, and whether the change appears to be an improvement."
command = "packages/AutOmicScience/tools/visual-inspector/target/release/visual-inspector"
args = ["compare_images"]
operation = "read"
read_only = true
destructive = false
version = "0.1.0"
tags = ["image", "comparison", "visualization"]
capabilities = ["diff-detection", "similarity-scoring"]

[metadata]
package = "AutOmicScience"
source = "BioAgent/AutOmicScience plugins/aose-visual-inspector"
implementation_path = "tools/visual-inspector"

[parameters]
type = "object"
required = ["before_path", "after_path"]

[parameters.properties.before_path]
type = "string"
description = "Path to the 'before' plot image"

[parameters.properties.after_path]
type = "string"
description = "Path to the 'after' plot image"
