kind = "process"
name = "validate_render"
description = "Validate that a rendered plot meets minimum quality threshold. Runs full quality analysis and returns pass/fail status based on configurable quality score threshold."
command = "packages/AutOmicScience/tools/visual-inspector/target/release/visual-inspector"
args = ["validate_render"]
operation = "read"
read_only = true
destructive = false
version = "0.1.0"
tags = ["image", "validation", "quality", "visualization"]
capabilities = ["quality-threshold", "automated-validation"]

[metadata]
package = "AutOmicScience"
source = "BioAgent/AutOmicScience plugins/aose-visual-inspector"
implementation_path = "tools/visual-inspector"

[parameters]
type = "object"
required = ["image_path"]

[parameters.properties.image_path]
type = "string"
description = "Path to the rendered plot image"

[parameters.properties.min_quality_score]
type = "number"
minimum = 0.0
maximum = 1.0
default = 0.5
description = "Minimum quality score threshold (0.0-1.0). Default is 0.5."
