[pytest]
# `tools/omics-compute/python` is a PYTHONPATH root holding the implementation package.
# (aose_omics_runtime, aose_agent). It is NOT an installed package — this file
# only tells pytest where that root is so `import aose_omics_runtime` / `import
# aose_agent` resolve. No build-system, no packaging.
pythonpath = .
testpaths = tests
markers =
    integration: real-data / external-resource tests; gated, deselected by default
