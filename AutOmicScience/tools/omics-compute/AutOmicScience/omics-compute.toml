kind = "tool"
name = "omics_compute"
description = "Run package-local omics compute subcommands backed by the migrated AOSE Python implementation."
runtime = "aose_omics_runtime"
module = "aose_omics_runtime"
pixi_environment = "default"
operation = "execute"
read_only = false
destructive = false

[metadata]
package = "AutOmicScience"
source = "AOSE origin/main 57ae83b with UPDATING exclusions applied"
excluded = ["census_query", "geo_fetch", "joint_embed", "spatial_neighbors", "python -m aose_agent", "bio-mas"]

[metadata.pixi_environment_by_modality]
scrna = "task1"
spatial = "task2"
scatac = "task4"
multiome = "task3"

[parameters]
type = "object"
required = ["subcommand"]

[parameters.properties.subcommand]
type = "string"
enum = [
  "load_dataset",
  "summarize",
  "preprocess",
  "validate_layout",
  "marker_table",
  "integrate",
  "read_spatial",
  "atac_qc",
  "peak_calling",
  "gene_activity",
  "load_multiome",
  "pathway_activity",
  "enrichment",
  "perturbation",
  "score",
]
description = "Compute subcommand. Data-acquisition subcommands census_query and geo_fetch are intentionally excluded until their implementation modules are migrated."

[parameters.properties.modality]
type = "string"
enum = ["scrna", "spatial", "scatac", "multiome"]
description = "Optional modality hint used by the execution layer to select a pinned environment."

[parameters.properties.args]
type = "object"
description = "Compute flags keyed by subcommand flag names."

[parameters.properties.pythonBin]
type = "string"
description = "Optional explicit Python interpreter."
