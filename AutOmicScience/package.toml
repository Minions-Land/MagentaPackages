# === Package-local infrastructure (no host module counterpart) ===
# These kinds back the tools above but are not themselves module/source/magnet
# HCP components: a Python runtime, its tests, and the pinned Pixi env + lock.
# They ship inside the package and are referenced by the tool descriptors
# (runtime = "aose_omics_runtime", env_manifest = "pixi.toml"). Flagged for the
# Magenta3 side: decide whether these stay manifest-declared infra or move under
# a dedicated runtime/<source> module in a later pass.

[[components]]
kind = "python-runtime"
name = "aose_omics_runtime"
source = "AutOmicScience"
path = "tools/omics-compute/python/aose_omics_runtime"

[[components]]
kind = "runtime-tests"
name = "aose_omics_runtime_tests"
source = "AutOmicScience"
path = "tools/omics-compute/python/tests"

[[components]]
