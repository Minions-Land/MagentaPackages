schema_version = "magenta.package.v2"
id = "AutOmicScience"
name = "AutOmicScience"
version = "1.0.0"
kind = "domain"
domain = "bioinformatics"
description = "Single-cell and spatial omics harness package migrated from AOSE optimize_omics."

# === HCP-isomorphic layout (schema v2) ===
# This package is an externalized slice of the Magenta3 HarnessComponentProtocol
# tree. Every contributed component lives at <module>/<source>/ with a real
# HcpMagnet.ts beside its descriptor/content, exactly like the host's
# tools/write/magenta/HcpMagnet.ts. The single source here is the package name
# ("AutOmicScience"); a merge package would add sibling <module>/<other-source>/
# dirs, each with its own HcpMagnet. The runtime magnet loader resolves
# `<component.path>/HcpMagnet.ts`, imports it, validates the bare-class shape
# (static build + module/kind/source + toTool|toCapability|toResource), and
# registers it into the same HcpClient as built-in magnets.
source = "AutOmicScience"

# Empty = no default narrowing: `--harness-package AutOmicScience` loads every
# component. Narrow with a selector, e.g.
# `--harness-package AutOmicScience:single-cell,spatial`.
default_profiles = []

# === Profiles for selective loading (one per domain family) ===

[[profiles]]
name = "single-cell"
description = "Single-cell RNA / ATAC / multiome analysis"
extends = []

[[profiles]]
name = "spatial"
description = "Spatial transcriptomics analysis"
extends = []

[[profiles]]
name = "bulk"
description = "Bulk RNA-seq and epigenomics"
extends = []

[[profiles]]
name = "genomics"
description = "Cancer somatic variants (MAF/CNA) and statistical genetics"
extends = []

[[profiles]]
name = "proteomics"
description = "Proteomics (Olink / mass-spec / phospho)"
extends = []

[[profiles]]
name = "metabolomics"
description = "Metabolomics / lipidomics"
extends = []

[[profiles]]
name = "microbiome"
description = "Microbiome (16S / metagenomics)"
extends = []

[[profiles]]
name = "dependency"
description = "Cancer dependency (DepMap / CCLE CRISPR screens)"
extends = []

[[profiles]]
name = "clinical"
description = "Clinical survival analysis (KM / Cox)"
extends = []

[[profiles]]
name = "bioml"
description = "Bioinformatics ML engineering and model reproduction"
extends = []

[[profiles]]
name = "phase-separation"
description = "Biomolecular phase separation / condensates"
extends = []

[[profiles]]
name = "immune"
description = "Immune repertoire (TCR / BCR)"
extends = []

# === Components ===
# Each component points to its <module>/<source> dir, where the runtime magnet
# loader finds HcpMagnet.ts + descriptor/content. Modality skills carry profile
# tags and load on bare selection or when their profile is selected. Untagged
# components (omics-shared/tools/brand/env) always load.

[[components]]
kind = "brand"
name = "AutOmicScience"
source = "AutOmicScience"
path = "brand/AutOmicScience"

[[components]]
kind = "skill"
name = "omics-shared"
source = "AutOmicScience"
path = "skills/omics-shared/AutOmicScience"
include_in_context = true

[[components]]
kind = "skill"
name = "single-cell"
source = "AutOmicScience"
path = "skills/single-cell/AutOmicScience"
include_in_context = true
profiles = ["single-cell"]

[[components]]
kind = "skill"
name = "spatial"
source = "AutOmicScience"
