name: Validate Packages

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate package manifests
        run: python scripts/validate_packages.py
      - name: Test visual inspector
        run: cargo test --locked --manifest-path AutOmicScience/tools/visual-inspector/Cargo.toml
      - name: Test bio API workspace
        run: cargo test --locked --manifest-path AutOmicScience/tools/bio-api/rust/Cargo.toml --workspace
