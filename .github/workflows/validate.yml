name: Validate Packages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate manifests and HCP package structure
        run: python scripts/validate_packages.py

      - name: Test package validation and release assembly
        run: |
          python scripts/test_validate_packages.py
          python scripts/test_build_release_artifact.py

      - name: Test PantheonOS package contracts
        run: python -m unittest discover -s PantheonOS/tests -v

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          run-install: false
          cache: false

      - name: Test MagentaWithPantheonOS runtime
        run: pixi run --manifest-path MagentaWithPantheonOS/tools/run-python/pixi.toml --frozen test

      - name: Test bio API workspace
        run: cargo test --locked --manifest-path AutOmicScience/tools/bio-api/rust/Cargo.toml --workspace
