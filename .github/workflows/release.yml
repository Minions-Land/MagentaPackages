name: Release Package

# Push a tag shaped `<PackageName>-v<version>` (for example,
# `AutOmicScience-v1.0.0`) to publish one package for every Magenta binary
# platform. Platform-specific archives let packages ship native tools without
# requiring Rust or another compiler on the user's machine.

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Parse and validate the release identity
        id: parse
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg="${tag%-v*}"
          ver="${tag##*-v}"
          if [ -z "$pkg" ] || [ -z "$ver" ] || [ "$pkg" = "$tag" ]; then
            echo "::error::Tag '$tag' is not of the form <PackageName>-v<version>"
            exit 1
          fi
          python - "$pkg" "$ver" <<'PY'
          import sys
          sys.path.insert(0, "scripts")
          from validate_packages import HcpClientisportablepackageid, HcpClientisstrictsemver

          package, version = sys.argv[1:]
          if not HcpClientisportablepackageid(package):
              raise SystemExit(f"unsafe package id: {package!r}")
          if not HcpClientisstrictsemver(version):
              raise SystemExit(f"invalid semantic version: {version!r}")
          PY
          if [ ! -f "$pkg/package.toml" ]; then
            echo "::error::No package.toml found for package '$pkg'"
            exit 1
          fi
          echo "package=$pkg" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Require the release tag commit to belong to verified main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${GITHUB_SHA}...main" --jq .status)"
          if [ "$status" != "ahead" ] && [ "$status" != "identical" ]; then
            echo "::error::Release tag commit ${GITHUB_SHA} is not on the verified main history (status: $status)"
            exit 1
          fi

      - name: Validate the package manifest
        run: python scripts/validate_packages.py --package "${{ steps.parse.outputs.package }}"

      - name: Verify manifest version matches tag
        shell: bash
        run: |
          manifest_ver="$(python scripts/package_version.py "${{ steps.parse.outputs.package }}")"
          if [ "$manifest_ver" != "${{ steps.parse.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.parse.outputs.version }}) does not match package.toml ($manifest_ver)"
            exit 1
          fi

      - name: Test release and workflow security contracts
        run: |
          python scripts/test_workflow_security.py
          python scripts/test_validate_packages.py
          python scripts/test_build_release_artifact.py

      - name: Install Cardiomni runtime test dependencies
        if: steps.parse.outputs.package == 'Cardiomni'
        run: python -m pip install --disable-pip-version-check --requirement Cardiomni/tools/cardio-imaging-tools/python/test-requirements.txt

      - name: Test Cardiomni imaging runtime
        if: steps.parse.outputs.package == 'Cardiomni'
        env:
          PYTHONPATH: Cardiomni/tools/cardio-imaging-tools/python
        run: python -m pytest Cardiomni/tools/cardio-imaging-tools/python/tests -q

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            rust_target: x86_64-unknown-linux-musl
            binary: aose-bio-mcp
          - runner: macos-14
            platform: macos-arm64
            rust_target: aarch64-apple-darwin
            binary: aose-bio-mcp
          - runner: macos-14
            platform: macos-x64
            rust_target: x86_64-apple-darwin
            binary: aose-bio-mcp
          - runner: windows-latest
            platform: windows-x64
            rust_target: x86_64-pc-windows-msvc
            binary: aose-bio-mcp.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Rust target for native package tools
        if: needs.prepare.outputs.package == 'AutOmicScience'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install musl linker
        if: needs.prepare.outputs.package == 'AutOmicScience' && matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Build native package tools
        if: needs.prepare.outputs.package == 'AutOmicScience'
        shell: bash
        run: |
          cargo build --locked --release \
            --manifest-path AutOmicScience/tools/bio-api/rust/Cargo.toml \
            --target "${{ matrix.rust_target }}" \
            --bin aose-bio-mcp

      - name: Verify portable Linux native tool
        if: needs.prepare.outputs.package == 'AutOmicScience' && matrix.rust_target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          binary="AutOmicScience/tools/bio-api/rust/target/${{ matrix.rust_target }}/release/${{ matrix.binary }}"
          file "$binary"
          if readelf -l "$binary" | grep -q 'Requesting program interpreter'; then
            echo "portable musl binary unexpectedly requests a dynamic interpreter" >&2
            exit 1
          fi
          if strings "$binary" | grep -Eq 'GLIBC_[0-9]'; then
            echo "portable musl binary unexpectedly references glibc" >&2
            exit 1
          fi
          "$binary" --help >/dev/null

      - name: Build platform package artifact
        shell: bash
        run: |
          args=(
            --package "${{ needs.prepare.outputs.package }}"
            --version "${{ needs.prepare.outputs.version }}"
            --platform "${{ matrix.platform }}"
            --output-dir release-assets
          )
          if [ "${{ needs.prepare.outputs.package }}" = "AutOmicScience" ]; then
            args+=(
              --native-binary
              "AutOmicScience/tools/bio-api/rust/target/${{ matrix.rust_target }}/release/${{ matrix.binary }}"
            )
          fi
          python scripts/build_release_artifact.py "${args[@]}"

      - name: Upload platform package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-${{ matrix.platform }}
          path: |
            release-assets/${{ needs.prepare.outputs.package }}-v${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz
            release-assets/${{ needs.prepare.outputs.package }}-v${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Verify the complete platform asset set
        shell: bash
        run: |
          set -euo pipefail
          prefix="${{ needs.prepare.outputs.package }}-v${{ needs.prepare.outputs.version }}"
          platforms=(linux-x64 macos-arm64 macos-x64 windows-x64)
          expected=()
          for platform in "${platforms[@]}"; do
            artifact="${prefix}-${platform}.tar.gz"
            checksum="${artifact}.sha256"
            expected+=("$artifact" "$checksum")
            test -f "release-assets/$artifact"
            test -f "release-assets/$checksum"
            (cd release-assets && sha256sum -c "$checksum")
          done
          mapfile -t actual < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          mapfile -t sorted_expected < <(printf '%s\n' "${expected[@]}" | sort)
          if ! diff -u <(printf '%s\n' "${sorted_expected[@]}") <(printf '%s\n' "${actual[@]}"); then
            echo "Downloaded package assets do not match the exact four-platform contract." >&2
            exit 1
          fi

      - name: Require an unused package Release destination
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$RUNNER_TEMP/package-release-lookup"
          set +e
          gh api --include "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" >"$response" 2>"$response.error"
          result=$?
          set -e
          status="$(head -n 1 "$response" | awk '{print $2}')"
          if [ "$result" -eq 0 ]; then
            echo "::error::Release ${GITHUB_REF_NAME} already exists; refusing in-place asset replacement"
            exit 1
          fi
          if [ "$status" != "404" ]; then
            echo "::error::Could not prove that Release ${GITHUB_REF_NAME} is unused"
            cat "$response.error" >&2
            exit 1
          fi

      - name: Stage private draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.prepare.outputs.package }} v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: false
          make_latest: false
          overwrite_files: false
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
          body: |
            Automated release of the `${{ needs.prepare.outputs.package }}` harness package,
            version `${{ needs.prepare.outputs.version }}`.

            After promotion to the public distribution repository, load it with:
            ```
            magenta --harness-package github:Minions-Land/Magenta-CLI/${{ needs.prepare.outputs.package }}@${{ needs.prepare.outputs.version }}
            ```

            Magenta selects the archive matching its binary platform and verifies
            the adjacent SHA256 file before extraction. Native package tools are
            embedded in the matching archive; no local Rust build is required.

      - name: Verify and publish the exact draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")"
          jq -e \
            --arg tag "$GITHUB_REF_NAME" \
            --arg name "${{ needs.prepare.outputs.package }} v${{ needs.prepare.outputs.version }}" \
            '.tag_name == $tag and .name == $name and .draft == true and .prerelease == false' \
            <<<"$release_json" >/dev/null

          prefix="${{ needs.prepare.outputs.package }}-v${{ needs.prepare.outputs.version }}"
          platforms=(linux-x64 macos-arm64 macos-x64 windows-x64)
          expected=()
          for platform in "${platforms[@]}"; do
            expected+=("${prefix}-${platform}.tar.gz" "${prefix}-${platform}.tar.gz.sha256")
          done
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          mapfile -t remote_sorted < <(jq -r '.assets[].name' <<<"$release_json" | sort)
          diff -u <(printf '%s\n' "${expected_sorted[@]}") <(printf '%s\n' "${remote_sorted[@]}")

          for name in "${expected[@]}"; do
            local_path="release-assets/$name"
            local_hash="$(sha256sum "$local_path" | awk '{print $1}')"
            local_size="$(stat -c '%s' "$local_path")"
            remote_digest="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .digest' <<<"$release_json")"
            remote_size="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .size' <<<"$release_json")"
            test "$remote_digest" = "sha256:$local_hash"
            test "$remote_size" = "$local_size"
          done

          release_id="$(jq -r .id <<<"$release_json")"
          test "$release_id" -gt 0
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -F draft=false >/dev/null
          published="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")"
          jq -e '.draft == false and .prerelease == false' <<<"$published" >/dev/null
