schema_version = "magenta.package.v2"
id = "ClaudeScience"
name = "ClaudeScience"
version = "0.1.0"
kind = "domain"
domain = "computational-biology"
description = "Computational biology package covering protein structure and design, biological sequence models, single-cell analysis, literature research, and scientific publishing."
source = "ClaudeScience"

# HCP-isomorphic layout: each skill at <skill>/<source>/HcpMagnet.ts
# Empty = no default narrowing: `--harness-package ClaudeScience` loads every skill.
# Narrow with a selector, e.g. `--harness-package ClaudeScience:design`.
default_profiles = []

# === Profiles for selective loading ===

[[profiles]]
name = "structure"
description = "Protein structure prediction and molecular docking skills"
extends = []

[[profiles]]
name = "design"
description = "Protein sequence design skills"
extends = ["structure"]

[[profiles]]
name = "sequence-models"
description = "DNA and protein sequence foundation models"
extends = []

[[profiles]]
name = "single-cell"
description = "Single-cell analysis and foundation-model skills"
extends = []

[[profiles]]
name = "research"
description = "Scientific literature and therapeutic research workflows"
extends = []

[[profiles]]
name = "publishing"
description = "Scientific figure composition and paper narrative skills"
extends = []

