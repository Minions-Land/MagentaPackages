schema_version = "magenta.package.v1"
id = "ClaudeScience"
name = "ClaudeScience"
kind = "domain"
domain = "computational-biology"
description = "Computational biology and bioinformatics harness package covering protein structure prediction, genomics, single-cell analysis, literature review, and scientific workflows."

# Empty = no default narrowing: `--harness-package ClaudeScience` loads every skill.
# Narrow with a selector, e.g. `--harness-package ClaudeScience:structure,design`.
default_profiles = []

# === Profiles for selective loading ===

[[profiles]]
name = "structure"
description = "Protein structure prediction skills (AlphaFold2, ESMFold, etc.)"
extends = []

[[profiles]]
name = "design"
description = "Protein design skills (ProteinMPNN, LigandMPNN, etc.)"
extends = []

[[profiles]]
name = "genomics"
description = "Genomics and molecular biology skills"
extends = []

[[profiles]]
name = "singlecell"
description = "Single-cell analysis skills"
extends = []

[[profiles]]
name = "research"
description = "Literature review and research workflow skills"
extends = []

[[profiles]]
name = "visualization"
description = "Figure composition and visualization skills"
extends = []

[[profiles]]
name = "compute"
description = "Remote compute and infrastructure skills"
extends = []

[[profiles]]
name = "meta"
description = "Self-improvement and meta-learning skills"
extends = []

