schema_version = "magenta.package.v2"
id = "Biomni"
name = "Biomni"
version = "0.1.0"
kind = "domain"
domain = "biomedical-ai"
description = "Biomedical AI toolkit from Stanford SNAP Lab with knowledge guides and executable tools covering sgRNA design, single-cell annotation, and general biomedical research workflows."
source = "Biomni"

# HCP-isomorphic layout: each skill at <skill>/<source>/HcpMagnet.ts
default_profiles = []

# === Knowledge Guide Skills with Tools ===

[[components]]
kind = "skill"
name = "sgrna-design"
source = "Biomni"
path = "skills/sgrna-design/Biomni"
description = "CRISPR sgRNA design guide with pre-computed human and mouse libraries and automated design tools"
include_in_context = false

[[components]]
kind = "skill"
name = "single-cell-annotation"
source = "Biomni"
path = "skills/single-cell-annotation/Biomni"
description = "Single-cell RNA-seq cell type annotation with automated tools"
include_in_context = false

[[components]]
kind = "skill"
name = "biomedical-tools"
source = "Biomni"
path = "skills/biomedical-tools/Biomni"
description = "General biomedical research tools covering database queries, drug discovery, genomics, imaging, and lab automation"
include_in_context = false
